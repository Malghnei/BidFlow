<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group - BidFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--theme-bgCardAlt);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .hero {
            background: linear-gradient(135deg, var(--theme-primary) 0%, var(--theme-accent) 100%);
            color: white;
            border-radius: 0.5rem;
            padding: 2rem;
        }
        
        
        .btn-danger {
            background-color: #dc2626;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-danger:hover {
            background-color: #991b1b;
        }
        
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            max-width: 28rem;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .member-card {
            background: #f8fafc;
            border: 1px solid var(--theme-border);
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="bg-theme-bg geo-pattern font-body">
    <div class="header sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center gap-3">
            <button onclick="window.history.back()" class="text-theme-textMuted">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <h1 class="text-theme-primary font-display text-lg font-semibold font-display">Group Details</h1>
        </div>
    </div>

    <div class="class="max-w-4xl mx-auto px-4 py-8" pb-32">
        <!-- Hero Section -->
        <div class="hero mb-8">
            <h1 id="groupName" class="text-3xl font-bold font-display mb-8">Group Name</h1>

            <div class="mb-6">
                <p class="text-blue-100 text-xs font-medium uppercase tracking-wide mb-2">Group Total</p>
                <div id="groupTotal" class="text-5xl font-bold font-display">$0.00</div>
            </div>

            <div>
                <p class="text-blue-100 text-xs font-medium uppercase tracking-wide mb-3">Join Code</p>
                <div class="flex items-center gap-3">
                    <div class="bg-theme-bgCard rounded px-4 py-3">
                        <p id="joinCode" class="text-2xl font-bold font-display text-theme-primary tracking-widest">----</p>
                    </div>
                    <button onclick="copyJoinCode()" class="bg-theme-bgCard text-theme-primary hover:bg-gray-100 px-4 py-2 rounded font-medium transition text-sm">Copy</button>
                </div>
                <p class="text-blue-100 text-xs mt-3 font-medium">Share this code to invite friends!</p>
            </div>
        </div>

        <!-- Members Section -->
        <div class="card geo-pattern-card p-6 mb-8">
            <h2 class="text-theme-primary font-display text-lg font-semibold font-display mb-6">Members</h2>
            <div id="membersList" class="space-y-3">
                <p class="text-theme-textMuted text-center text-sm py-6">Loading members...</p>
            </div>
        </div>

        <!-- Actions Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
            <button onclick="openInviteModal()" class="btn-primary font-medium text-sm py-3">Invite Members</button>
            <button id="leaveBtn" onclick="leaveGroup()" class="btn-danger font-medium text-sm py-3">Leave Group</button>
        </div>

        <!-- Edit Your Contribution -->
        <div class="card geo-pattern-card p-6">
            <h3 class="text-theme-primary font-display font-semibold font-display mb-4">Update Your Contribution</h3>
            <div class="flex gap-3 items-end">
                <div class="flex-1">
                    <label for="yourContribution" class="text-theme-text block text-sm font-medium mb-2">Your Amount</label>
                    <input type="number" id="yourContribution" placeholder="$0.00" min="0" step="0.01">
                </div>
                <button onclick="updateContribution()" class="btn-primary font-medium text-sm px-6 py-3">Update</button>
            </div>
        </div>
    </div>

    <!-- Invite Modal -->
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h2 class="text-theme-primary font-display text-lg font-semibold font-display mb-6">Invite Members</h2>
            <div class="space-y-4">
                <div>
                    <label for="shareCode" class="text-theme-text block text-sm font-medium mb-2">Share Join Code</label>
                    <div class="flex gap-2">
                        <div style="background-color: #f1f5f9;" class="flex-1 rounded px-4 py-3 font-bold font-display text-theme-primary text-center text-sm" id="shareCode">----</div>
                        <button type="button" onclick="copyShareCode()" class="btn-primary font-medium text-sm px-4 py-3">Copy</button>
                    </div>
                </div>
                <button type="button" onclick="closeInviteModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-900 font-medium py-2 rounded transition">Done</button>
            </div>
        </div>
    </div>

    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        let group = null;
        let socket = null;
        let currentBidderId = null;

        const eventId = sessionStorage.getItem('eventId');
        const bidderId = sessionStorage.getItem('bidderId');
        currentBidderId = bidderId;

        if (!eventId || !bidderId) {
            window.location.href = '/index.html';
        }

        function getGroupId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('groupId');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        }

        function copyJoinCode() {
            const code = document.getElementById('joinCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        function copyShareCode() {
            const code = document.getElementById('shareCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        function openInviteModal() {
            document.getElementById('inviteModal').classList.add('show');
            document.getElementById('shareCode').textContent = document.getElementById('joinCode').textContent;
        }

        function closeInviteModal() {
            document.getElementById('inviteModal').classList.remove('show');
        }

        async function updateContribution() {
            const newAmount = parseFloat(document.getElementById('yourContribution').value);
            if (!newAmount || newAmount < 0) {
                alert('Please enter a valid amount');
                return;
            }

            const groupId = getGroupId();

            try {
                // FIX: PATCH to /groups/:groupId/contribution with {bidderId, amount}
                const response = await fetch(`/api/events/${eventId}/groups/${groupId}/contribution`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bidderId, amount: newAmount })
                });

                if (!response.ok) throw new Error('Failed to update contribution');

                alert('Contribution updated!');
                loadGroup();
            } catch (error) {
                alert(error.message);
            }
        }

        async function leaveGroup() {
            if (!confirm('Are you sure you want to leave this group?')) return;

            const groupId = getGroupId();

            try {
                const response = await fetch(`/api/events/${eventId}/groups/${groupId}/leave`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bidderId })
                });

                if (!response.ok) throw new Error('Failed to leave group');

                setTimeout(() => window.history.back(), 300);
            } catch (error) {
                alert(error.message);
            }
        }

        async function loadGroup() {
            const groupId = getGroupId();

            if (!groupId) {
                window.location.href = '/items.html';
                return;
            }

            try {
                const response = await fetch(`/api/events/${eventId}/groups/${groupId}`);
                const data = await response.json();

                // FIX: Server returns { group: {...} } wrapper. Use group.name or group.groupName
                group = data.group || data;

                const groupName = group.name || group.groupName;
                document.getElementById('groupName').textContent = esc(groupName);
                document.getElementById('groupTotal').textContent = formatCurrency(group.totalAmount);
                document.getElementById('joinCode').textContent = group.joinCode;

                const membersList = document.getElementById('membersList');
                if (group.members && group.members.length > 0) {
                    membersList.innerHTML = group.members.map(member => {
                        const isMe = member.bidderId === currentBidderId;
                        return `
                            <div class="member-card">
                                <div>
                                    <p class="text-theme-text font-semibold font-display text-sm">${esc(member.displayName)}</p>
                                    <p class="text-theme-textMuted text-xs">${isMe ? 'You' : 'Member'}</p>
                                </div>
                                <div class="text-right">
                                    <p style="color: var(--theme-accent);" class="text-base font-bold font-display">${formatCurrency(member.contribution)}</p>
                                    <p class="text-theme-textMuted text-xs">${isMe ? 'Your contribution' : 'Contributed'}</p>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    membersList.innerHTML = '<p class="text-theme-textMuted text-center text-sm py-6">No members yet</p>';
                }

                const myMember = group.members && group.members.find(m => m.bidderId === currentBidderId);
                if (myMember) {
                    document.getElementById('yourContribution').value = myMember.contribution;
                }
            } catch (error) {
                console.error('Failed to load group:', error);
                alert('Failed to load group. Please try again.');
            }
        }

        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                socket.emit('join-auction', { eventId, bidderId });
            });

            socket.on('group:updated', (data) => {
                if (data.groupId === getGroupId()) {
                    loadGroup();
                }
            });

            socket.on('group:joined', (data) => {
                if (data.groupId === getGroupId()) {
                    loadGroup();
                }
            });
        }

        loadGroup();
        initSocket();
    </script>

    <!-- Bottom Navigation -->
    <div class="app-nav-bar">
        <a href="/items.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span>Items</span>
        </a>
        <a href="/mybids.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>My Bids</span>
        </a>
        <a href="/groups.html" class="app-nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <span>Groups</span>
        </a>
        <a href="/profile.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span>Profile</span>
        </a>
    </div>

</body>
</html>
