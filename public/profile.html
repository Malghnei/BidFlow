<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BidFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--theme-bgCardAlt);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .hero {
            background: linear-gradient(135deg, var(--theme-primary) 0%, var(--theme-accent) 100%);
            color: white;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .avatar span {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card {
            background: white;
            border: 1px solid var(--theme-border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }
        .stat-value {
            font-size: 1.875rem;
            font-weight: bold;
        }
        .stat-label {
            color: #475569;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-label {
            color: #475569;
            font-size: 0.875rem;
        }
        .info-value {
            color: #0f172a;
            font-weight: 500;
        }
        .action-link {
            display: block;
            width: 100%;
            background: white;
            border: 1px solid var(--theme-border);
            color: #0f172a;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .action-link:hover {
            background-color: var(--theme-bgCardAlt);
        }
        .action-danger {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }
        .action-danger:hover {
            background: #fecaca;
        }
        </style>
</head>
<body class="bg-theme-bg geo-pattern font-body overflow-x-hidden">
    <!-- Unified Top Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-transparent flex justify-between items-center px-8 py-4 pointer-events-none">
        <h1 class="text-theme-primary font-display text-3xl font-extrabold drop-shadow-sm pointer-events-auto">Profile</h1>
        
        <div class="absolute left-1/2 -translate-x-1/2 pointer-events-auto bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full border border-theme-border shadow-sm">
            <img
                src="/img/Islamic%20Relief%20Canada.png"
                alt="Islamic Relief Canada"
                class="h-8 w-auto"
            />
        </div>

        <div class="relative pointer-events-auto group">
            <button class="p-2 bg-white/80 backdrop-blur-md border border-theme-border rounded-full hover:bg-theme-bgCard transition shadow-sm">
                <svg class="w-5 h-5 text-theme-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-theme-border opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                <div class="p-3 border-b border-theme-border"><p class="text-sm font-bold text-theme-text">Updates</p></div>
                <div class="p-3 text-xs text-theme-textMuted">No new notifications.</div>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-32">
        <!-- Avatar & Name -->
        <div class="hero mb-8">
            <div class="avatar">
                <span id="avatarInitials">?</span>
            </div>
            <h2 id="profileDisplayName" class="text-2xl font-bold font-display mb-1">Loading...</h2>
            <p id="profileAnonymityBadge" style="color: rgba(255, 255, 255, 0.7);" class="text-xs font-medium mb-4"></p>
            <div style="background-color: rgba(255, 255, 255, 0.1);" class="inline-block rounded px-6 py-3">
                <p style="color: rgba(255, 255, 255, 0.7);" class="text-xs font-medium uppercase tracking-wide mb-1">Bidder Code</p>
                <p id="profileBidderCode" class="text-2xl font-bold font-display tracking-widest text-white">---</p>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="stat-card">
                <div style="color: var(--theme-accent);" class="stat-value" id="statBids">0</div>
                <div class="stat-label">Bids</div>
            </div>
            <div class="stat-card">
                <div style="color: #059669;" class="stat-value" id="statWinning">0</div>
                <div class="stat-label">Winning</div>
            </div>
            <div class="stat-card">
                <div style="color: #7c3aed;" class="stat-value" id="statGroups">0</div>
                <div class="stat-label">Groups</div>
            </div>
        </div>

        <!-- Personal Info -->
        <div class="card geo-pattern-card p-6 mb-8">
            <h3 class="text-theme-primary font-display text-base font-semibold font-display mb-4">Personal Information</h3>
            <div class="space-y-3">
                <div class="info-row">
                    <span class="info-label">Full Name</span>
                    <span class="info-value" id="infoName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="infoEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="infoPhone">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Display Mode</span>
                    <span class="info-value" id="infoMode">-</span>
                </div>
                <div class="info-row" style="border-bottom: none;">
                    <span class="info-label">Payment</span>
                    <span class="info-value" id="infoPayment" style="color: #059669;">Linked</span>
                </div>
            </div>
        </div>

        <!-- Event Info -->
        <div class="card geo-pattern-card p-6 mb-8">
            <h3 class="text-theme-primary font-display text-base font-semibold font-display mb-4">Event</h3>
            <div class="space-y-3">
                <div class="info-row">
                    <span class="info-label">Event Name</span>
                    <span class="info-value" id="infoEvent">-</span>
                </div>
                <div class="info-row" style="border-bottom: none;">
                    <span class="info-label">Status</span>
                    <span style="background-color: #d1fae5; color: #065f46;" class="px-2 py-1 rounded text-xs font-medium">Active</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="space-y-2">
            <a href="/mybids.html" class="action-link">View My Bids</a>
            <a href="/groups.html" class="action-link">View My Groups</a>
            <button onclick="leaveEvent()" class="action-link action-danger">Leave Event</button>
        </div>
    </div>

    
    <!-- Bottom Navigation -->
    <div class="app-nav-bar">
        <a href="/items.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span>Items</span>
        </a>
        <a href="/mybids.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>My Bids</span>
        </a>
        <a href="/groups.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <span>Groups</span>
        </a>
        <a href="/profile.html" class="app-nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span>Profile</span>
        </a>
    </div>


    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        const eventId = sessionStorage.getItem('eventId');
        const bidderId = sessionStorage.getItem('bidderId');

        if (!eventId || !bidderId) {
            window.location.href = '/index.html';
        }

        function leaveEvent() {
            if (!confirm('Are you sure you want to leave this event? You will need to re-register.')) return;
            sessionStorage.clear();
            window.location.href = '/index.html';
        }

        async function loadProfile() {
            const displayName = sessionStorage.getItem('displayName') || 'Bidder';
            const bidderCode = sessionStorage.getItem('bidderCode') || '---';

            document.getElementById('profileDisplayName').textContent = displayName;
            document.getElementById('profileBidderCode').textContent = bidderCode;

            const initials = displayName === 'Anonymous Bidder' ? '?' : displayName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('avatarInitials').textContent = initials;

            try {
                const res = await fetch(`/api/events/${eventId}/bidders`);
                if (res.ok) {
                    const data = await res.json();
                    const bidders = Array.isArray(data) ? data : (data.bidders || []);
                    const me = bidders.find(b => b.id === bidderId);
                    if (me) {
                        document.getElementById('infoName').textContent = esc(`${me.firstName} ${me.lastName}`);
                        document.getElementById('infoEmail').textContent = esc(me.email || '-');
                        document.getElementById('infoPhone').textContent = esc(me.phone || '-');

                        const modeLabels = { real_name: 'Real Name', nickname: 'Nickname', anonymous: 'Anonymous' };
                        document.getElementById('infoMode').textContent = modeLabels[me.anonymityMode] || me.anonymityMode;

                        const paymentEl = document.getElementById('infoPayment');
                        paymentEl.textContent = me.paymentLinked ? 'Linked' : 'Not linked';
                        paymentEl.style.color = me.paymentLinked ? '#059669' : '#b45309';

                        const badge = me.anonymityMode === 'anonymous' ? 'Anonymous Mode'
                            : me.anonymityMode === 'nickname' ? 'Nickname Mode'
                            : 'Public Profile';
                        document.getElementById('profileAnonymityBadge').textContent = badge;
                    }
                }
            } catch (e) {
                console.error('Failed to load bidder info', e);
            }

            try {
                const res = await fetch(`/api/events/${eventId}`);
                if (res.ok) {
                    const event = await res.json();
                    document.getElementById('infoEvent').textContent = esc(event.name || event.eventName || '-');
                }
            } catch (e) {
                console.error('Failed to load event info', e);
            }

            try {
                const [bidsRes, groupsRes] = await Promise.all([
                    fetch(`/api/events/${eventId}/bidders/${bidderId}/bids`),
                    fetch(`/api/events/${eventId}/bidders/${bidderId}/groups`)
                ]);

                if (bidsRes.ok) {
                    const data = await bidsRes.json();
                    const bids = data.bids || [];
                    document.getElementById('statBids').textContent = bids.length;
                    document.getElementById('statWinning').textContent = bids.filter(b => b.status === 'winning').length;
                }

                if (groupsRes.ok) {
                    const data = await groupsRes.json();
                    document.getElementById('statGroups').textContent = (data.groups || []).length;
                }
            } catch (e) {
                console.error('Failed to load stats', e);
            }
        }

        loadProfile();
    </script>
</body>
</html>
