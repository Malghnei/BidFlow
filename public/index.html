<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidFlow - Join Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/theme.js"></script>
  <script src="/app-config.js"></script>
  <link rel="stylesheet" href="/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--theme-bgCardAlt);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        
        
        
        
        
        .error-message {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            color: #475569;
        }
    </style>
</head>
<body class="bg-theme-bg geo-pattern font-body">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md">
            <div class="card geo-pattern-card p-8">
                <div class="text-center mb-8">
                    <img
                        src="/img/Islamic%20Relief%20Canada.png"
                        alt="Islamic Relief Canada"
                        class="h-16 w-auto mx-auto mb-2"
                    />
                    <p class="text-theme-textMuted text-sm font-medium">Islamic Relief Canada x Western IRC</p>
                </div>

                <form id="joinForm" class="space-y-6">
                    <div>
                        <label for="passcode" class="text-theme-text block text-sm font-medium mb-2">
                            Event Passcode
                        </label>
                        <input
                            type="text"
                            id="passcode"
                            placeholder="Enter 6-digit code"
                            maxlength="6"
                            inputmode="numeric"
                            required
                            class="w-full text-center text-2xl tracking-widest font-bold font-display"
                        >
                        <div id="error" class="error-message"></div>
                    </div>

                    <button type="submit" class="btn-primary w-full text-lg py-3 font-medium">
                        Join Event
                    </button>
                </form>

                <div class="loading-spinner mt-6">
                    <div style="border: 2px solid var(--theme-border); border-top: 2px solid var(--theme-primary);" class="w-6 h-6 rounded-full animate-spin mx-auto"></div>
                </div>
            </div>

            <div class="mt-8 text-center border-t border-theme-border pt-6">
                <p class="text-theme-textMuted text-xs font-bold uppercase tracking-wider mb-4">Demo Navigation</p>
                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <a href="/admin.html" class="px-6 py-2 rounded-lg border-2 border-theme-primary text-theme-primary font-bold hover:bg-theme-primary hover:text-white transition-colors text-sm w-full sm:w-auto">
                        Admin Dashboard
                    </a>
                    <a href="/display.html" class="px-6 py-2 rounded-lg bg-theme-accent text-white font-bold hover:bg-yellow-600 transition-colors text-sm w-full sm:w-auto shadow-md">
                        Open Live Display
                    </a>
                </div>
            </div>
        </div>
    </div>



    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        const form = document.getElementById('joinForm');
        const passcodeInput = document.getElementById('passcode');
        const errorDiv = document.getElementById('error');
        const loading = document.querySelector('.loading-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const passcode = passcodeInput.value.trim();

            if (passcode.length !== 6) {
                errorDiv.textContent = 'Passcode must be 6 digits';
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const data = await window.BidFlowConfig.resolveEvent({ passcode });
                window.BidFlowConfig.setPasscode(passcode);

                if (!data.eventId) {
                    errorDiv.textContent = 'Invalid passcode';
                    form.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }
                sessionStorage.setItem('eventId', data.eventId);
                sessionStorage.setItem('eventName', esc(data.eventName || 'Charity Auction'));

                window.location.href = '/register.html';
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                form.style.display = 'block';
                loading.style.display = 'none';
            }
        });

        passcodeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
