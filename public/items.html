<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items - BidFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--theme-bgCardAlt);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .card:hover {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        .item-image {
            width: 100%;
            height: 200px;
            background-color: #f1f5f9;
            border-radius: 0.5rem 0.5rem 0 0;
            object-fit: cover;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-winning {
            background-color: #d1fae5;
            color: #065f46;
        }
        </style>
</head>
<body class="bg-theme-bg geo-pattern font-body overflow-x-hidden">
    <!-- Unified Top Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-transparent flex justify-between items-center px-8 py-4 pointer-events-none">
        <h1 class="text-theme-primary font-display text-3xl font-extrabold drop-shadow-sm pointer-events-auto">Auction Items</h1>
        
        <div class="absolute left-1/2 -translate-x-1/2 pointer-events-auto bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full border border-theme-border shadow-sm">
            <img
                src="/img/Islamic%20Relief%20Canada.png"
                alt="Islamic Relief Canada"
                class="h-8 w-auto"
            />
        </div>

        <div class="relative pointer-events-auto group">
            <button class="p-2 bg-white/80 backdrop-blur-md border border-theme-border rounded-full hover:bg-theme-bgCard transition shadow-sm">
                <svg class="w-5 h-5 text-theme-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-theme-border opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                <div class="p-3 border-b border-theme-border"><p class="text-sm font-bold text-theme-text">Updates</p></div>
                <div class="p-3 text-xs text-theme-textMuted">No new notifications.</div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-24 pb-32">
        <!-- Filters / Tabs -->
        <div class="flex gap-3 overflow-x-auto pb-4 mb-4 hide-scrollbar">
            <button class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold bg-theme-primary text-white border border-transparent shadow-sm transition-transform active:scale-95">All Items</button>
            <button class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold bg-theme-bgCard text-theme-textMuted border border-theme-border hover:bg-theme-bgCardAlt transition-colors">No Bids</button>
            <button class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold bg-theme-bgCard text-theme-textMuted border border-theme-border hover:bg-theme-bgCardAlt transition-colors">My Bids</button>
        </div>

        <div id="itemsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

        <div id="loading" class="text-center py-12">
            <div style="border: 2px solid var(--theme-border); border-top: 2px solid var(--theme-primary);" class="w-8 h-8 rounded-full animate-spin mx-auto"></div>
            <p class="text-theme-textMuted mt-4">Loading items...</p>
        </div>

        <div id="error" style="display: none; color: #991b1b; background-color: #fee2e2; border: 1px solid #fecaca;" class="p-6 rounded-lg mt-8"></div>
    </div>

    
    <!-- Bottom Navigation -->
    <div class="app-nav-bar">
        <a href="/items.html" class="app-nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span>Items</span>
        </a>
        <a href="/mybids.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>My Bids</span>
        </a>
        <a href="/groups.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <span>Groups</span>
        </a>
        <a href="/profile.html" class="app-nav-item ">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span>Profile</span>
        </a>
    </div>


    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        let items = [];
        let socket = null;

        const eventId = sessionStorage.getItem('eventId');
        const bidderId = sessionStorage.getItem('bidderId');

        if (!eventId || !bidderId) {
            window.location.href = '/index.html';
        }

        async function loadItems() {
            try {
                const response = await fetch(`/api/events/${eventId}/items`);
                const data = await response.json();

                // FIX: Server returns plain array, not {items:[...]}
                items = Array.isArray(data) ? data : (data.items || []);

                renderItems();
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                document.getElementById('error').textContent = 'Failed to load items';
                document.getElementById('error').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = items.map(item => {
                const currentBid = item.currentBid || 0;
                return `
                    <div class="card geo-pattern-card overflow-hidden hover:shadow-lg transition-transform duration-200 cursor-pointer" onclick="goToItem('${esc(item.id)}')">
                        <div class="relative aspect-video bg-theme-bgCardAlt">
                            ${item.image ? `<img src="${esc(item.image)}" alt="${esc(item.title)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-theme-textMuted font-display opacity-50">No Image</div>`}
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-theme-primary shadow-sm">
                                Lot #${item.lotNumber || '-'}
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-theme-text font-bold font-display text-lg mb-2 line-clamp-2 leading-tight">${esc(item.title)}</h3>
                            
                            <div class="mt-4 pt-4 border-t border-theme-border flex justify-between items-end">
                                <div>
                                    <p class="text-theme-textMuted text-xs font-semibold tracking-wider uppercase mb-1">Current Bid</p>
                                    <p class="text-theme-primary text-2xl font-bold font-display">$${currentBid.toFixed(2)}</p>
                                </div>
                                ${item.isWinning ? '<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold">Winning</span>' : '<span class="text-theme-accent text-sm font-bold flex items-center gap-1">Bid Now <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // FIX: Quote the UUID in goToItem
        function goToItem(itemId) {
            window.location.href = `/item.html?itemId=${itemId}`;
        }

        function initSocket() {
            socket = io();
            socket.on('connect', () => {
                // FIX: Emit join-auction, not join:event or join
                socket.emit('join-auction', { eventId, bidderId });
            });

            socket.on('bid:new', (data) => {
                const item = items.find(i => i.id === data.itemId);
                if (item) {
                    item.currentBid = data.amount;
                    renderItems();
                }
            });
        }

        loadItems();
        initSocket();
    </script>
</body>
</html>
